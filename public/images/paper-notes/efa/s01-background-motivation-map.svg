<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">EFA 背景与动机脉络图</title>
  <desc id="desc">神经网络势、消息传递、注意力机制、线性注意力、RoPE、ERoPE 和 EFA 之间关系的脉络图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#7a2e22"/>
    </marker>
    <style>
      text {
        font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, serif;
        fill: #171412;
        letter-spacing: 0;
      }
      .title {
        font-size: 34px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 18px;
        fill: #615b53;
      }
      .label {
        font-size: 23px;
        font-weight: 700;
      }
      .body {
        font-size: 18px;
        fill: #443f39;
      }
      .small {
        font-size: 15px;
        fill: #6a635a;
      }
      .math {
        font-size: 18px;
        font-family: Georgia, "Times New Roman", serif;
      }
      .card {
        fill: #fbfaf7;
        stroke: #d8cfc1;
        stroke-width: 2;
        rx: 12;
      }
      .card-warm {
        fill: #f7efe6;
        stroke: #d7a171;
      }
      .card-cool {
        fill: #ecf2f1;
        stroke: #7aa39b;
      }
      .card-alert {
        fill: #f8eeee;
        stroke: #b86f63;
      }
      .card-result {
        fill: #eef1e7;
        stroke: #8ea46b;
      }
      .line {
        fill: none;
        stroke: #7a2e22;
        stroke-width: 3;
        marker-end: url(#arrow);
      }
      .line-soft {
        fill: none;
        stroke: #a98c73;
        stroke-width: 2.5;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect width="1120" height="720" fill="#fbfaf7"/>

  <text x="560" y="52" text-anchor="middle" class="title">EFA 的背景、动机与由来</text>
  <text x="560" y="84" text-anchor="middle" class="subtitle">从局部原子势场与全局注意力机制之间的矛盾出发</text>

  <rect x="70" y="130" width="300" height="126" class="card card-warm"/>
  <text x="96" y="168" class="label">原子中心势场</text>
  <text x="96" y="202" class="body">Behler-Parrinello</text>
  <text x="96" y="229" class="body">SchNet / NequIP / MACE</text>

  <rect x="70" y="328" width="300" height="126" class="card card-alert"/>
  <text x="96" y="366" class="label">局部 cutoff</text>
  <text x="96" y="400" class="body">计算接近线性</text>
  <text x="96" y="427" class="body">但长程信息难传递</text>

  <rect x="410" y="130" width="300" height="126" class="card card-cool"/>
  <text x="436" y="168" class="label">Self-attention</text>
  <text x="436" y="202" class="body">全连接图上读取信息</text>
  <text x="436" y="229" class="body">适合全局依赖</text>

  <rect x="410" y="328" width="300" height="126" class="card card-alert"/>
  <text x="436" y="366" class="label">直接用于原子图</text>
  <text x="436" y="400" class="body">需要所有原子对几何</text>
  <text x="436" y="427" class="math">time / memory ≈ O(N²)</text>

  <rect x="750" y="130" width="300" height="126" class="card card-cool"/>
  <text x="776" y="168" class="label">Linear attention</text>
  <text x="776" y="202" class="body">先聚合 key-value</text>
  <text x="776" y="229" class="math">complexity ≈ O(N)</text>

  <rect x="750" y="328" width="300" height="126" class="card card-alert"/>
  <text x="776" y="366" class="label">欧氏几何难题</text>
  <text x="776" y="400" class="body">相对位移与取向</text>
  <text x="776" y="427" class="body">还要满足旋转对称性</text>

  <rect x="220" y="535" width="260" height="106" class="card"/>
  <text x="246" y="572" class="label">RoPE → ERoPE</text>
  <text x="246" y="604" class="body">在 query-key 内积中</text>
  <text x="246" y="629" class="body">自然产生相对位置</text>

  <rect x="520" y="535" width="380" height="106" class="card card-result"/>
  <text x="546" y="572" class="label">Euclidean fast attention</text>
  <text x="546" y="604" class="body">ERoPE + 球面积分 + 线性聚合</text>
  <text x="546" y="629" class="body">以接近线性复杂度表达全局几何相关</text>

  <path d="M 220 256 L 220 318" class="line-soft"/>
  <path d="M 560 256 L 560 318" class="line-soft"/>
  <path d="M 900 256 L 900 318" class="line-soft"/>

  <path d="M 370 391 C 398 391 398 391 410 391" class="line"/>
  <path d="M 710 391 C 738 391 738 391 750 391" class="line"/>

  <path d="M 900 454 C 900 492 445 490 372 535" class="line"/>
  <path d="M 560 454 C 560 494 430 496 384 535" class="line"/>
  <path d="M 480 588 L 510 588" class="line"/>

  <text x="560" y="486" text-anchor="middle" class="small">核心张力：既要全局交互，又要线性扩展，还要尊重欧氏对称性</text>
</svg>
